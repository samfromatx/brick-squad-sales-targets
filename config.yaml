# --- Budget Portfolios ---
# Define which budget levels to generate.
# The script auto-selects cards ranked by EV ROI%.
# You can override specific allocations per budget.
budgets:
  - amount: 500
    title: "$500 Budget — Grading & Flip"
    strategy_focus: "value_bulk"     # Prioritize Value Bulk grading plays
    include_psa10_holds: false       # No PSA 10 purchases at this budget
    max_grading_cards: 15
    include_collectors_club: true

  - amount: 1000
    title: "$1,000 Budget — Split Grading + Holds"
    strategy_focus: "mixed"
    include_psa10_holds: true
    max_grading_cards: 16
    max_psa10_holds: 2
    include_collectors_club: true

  - amount: 1500
    title: "$1,500 Budget — Diversified EV"
    strategy_focus: "mixed"
    include_psa10_holds: true
    max_grading_cards: 18
    max_psa10_holds: 4
    include_collectors_club: true

  - amount: 2000
    title: "$2,000 Budget — Maximum EV Conviction"
    strategy_focus: "premium"
    include_psa10_holds: true
    max_grading_cards: 22
    max_psa10_holds: 5
    include_collectors_club: true

# --- Sell Timing Calendar ---
# Update these dates each season
sell_calendar:
  - date: "NOW → Mar"
    label: "🟢 BUY ZONE"
    action: "BUY + SUBMIT"
    note: "Accumulate at max bid prices. Submit PSA orders ASAP."
    current: true

  - date: "Apr 12 → May"
    label: "🏀 Playoffs Begin"
    action: "SELL B / HOLD S+A"
    note: "Sell Tier B raws after Round 1. Hold flagships. Value Max returns arrive."

  - date: "May → Jun"
    label: "🏆 Conf Finals / Finals"
    action: "SELL PSA 10s"
    note: "Sell PSA 10s of players still alive. Peak demand."

  - date: "Jun"
    label: "🏅 NBA Awards"
    action: "SELL WINNERS"
    note: "Sell INTO announcements, not after. Value Bulk returns start arriving."

  - date: "Jul-Aug"
    label: "📉 Offseason"
    action: "HOLD / BUY"
    note: "Prices dip 10-20%. Don't sell. Next buy window."

  - date: "Aug 24"
    label: "💜 Mamba Day"
    action: "SELL KOBE"
    note: "Sell all Kobe cards. List 3-5 days before."

  - date: "Oct"
    label: "🏀 New Season"
    action: "HOLD"
    note: "Panini scarcity builds. Topps takes over."
