# ============================================================
# Brick Squad Sports Cards — Report Generator Config
# ============================================================
# Update this file each month with your current player tiers,
# card selections, and budget levels. The script reads this
# config + your 30-day CSV to generate the full report.
# ============================================================

# --- PSA Grading Costs (update when PSA changes pricing) ---
psa_pricing:
  collectors_club: 149.00       # Annual membership fee
  value_bulk: 24.99            # Requires Collectors Club, 5-card min
  value: 32.99                 # No membership required
  value_plus: 49.99            # ~45 biz days
  value_max: 64.99             # ~35 biz days
  regular: 79.99               # ~25 biz days

psa_turnaround:
  value_bulk: "65-95 biz days"
  value: "55-75 biz days"
  value_plus: "~45 biz days"
  value_max: "~35 biz days"
  regular: "~25 biz days"

psa_back_by:
  value_bulk: "Jun-Aug"
  value: "Jun-Jul"
  value_plus: "May-Jun"
  value_max: "Apr-May"
  regular: "Apr"

# --- Max Bid Formula ---
# FMV = (avg_30d * fmv_avg_weight) + (last_sale * fmv_last_weight)
# trend_pct = (last_sale - avg_30d) / avg_30d
# multiplier: UP (> up_threshold) | FLAT (between) | DOWN (< down_threshold)
# max_bid = FMV * multiplier
max_bid_formula:
  fmv_avg_weight: 0.60
  fmv_last_weight: 0.40
  up_threshold: 0.10           # +10% = trending up
  down_threshold: -0.10        # -10% = trending down
  up_multiplier: 0.95          # Aggressive — buy near FMV
  flat_multiplier: 0.85        # Standard discount
  down_multiplier: 0.75        # Defensive — demand discount

# --- Gem Rate Calculation ---
# Sales gem rate is inflated (PSA 10s sell more often due to higher value).
# We don't apply a correction factor here — the raw sales distribution
# is used directly since it represents what the market actually produces.
# PSA 8 value is estimated as a fraction of PSA 9 value.
gem_rate:
  psa8_value_fraction: 0.40    # PSA 8 estimated at 40% of PSA 9 value

