name: Recalculate Card Targets

on:
  workflow_dispatch:
    inputs:
      sports:
        description: 'Which sports to recalculate'
        required: true
        default: 'football basketball'
        type: choice
        options:
          - 'football basketball'
          - football
          - basketball

jobs:
  recalculate:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Force IPv4 (GitHub Actions IPv6 is not routable to Supabase)
        run: |
          sudo sysctl -w net.ipv6.conf.all.disable_ipv6=1
          sudo sysctl -w net.ipv6.conf.default.disable_ipv6=1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run recalculation
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_JWT_SECRET: ${{ secrets.SUPABASE_JWT_SECRET }}
          ALLOWED_ORIGINS: 'https://brick-squad-sales-targets.vercel.app'
        run: python scripts/recalculate_targets.py ${{ github.event.inputs.sports }}
